{% extends "base.html" %}

{% block title %}Edit Profile - CineVerse{% endblock %}

{% block content %}
<style>
    .auth-container { display: flex; justify-content: center; align-items: center; min-height: 70vh; padding: 40px 20px; }
    .auth-card { background: var(--imdb-light-gray, #1a1a1a); padding: 40px; border-radius: 8px; width: 100%; max-width: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); border: 1px solid #333; }
    .auth-header { text-align: center; margin-bottom: 30px; }
    .auth-header h1 { margin: 0 0 10px 0; color: #fff; font-size: 28px; font-weight: 900; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; color: #ddd; margin-bottom: 8px; font-size: 14px; font-weight: bold; text-transform: capitalize; }
    
    /* Input Styling */
    .form-group input[type="text"], 
    .form-group input[type="url"],
    .form-group input[type="date"],
    .form-group textarea,
    .form-group input[type="file"] { width: 100%; background: #111; color: #fff; border: 1px solid #333; border-radius: 4px; padding: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
    
    .form-group input:focus, .form-group textarea:focus { border-color: var(--imdb-yellow, #f5c518); }
    .form-group textarea { resize: vertical; }
    
    /* Error styling */
    .errorlist { color: #e74c3c; list-style: none; padding: 0; font-size: 13px; margin-top: 5px; }

    .auth-btn { width: 100%; background-color: var(--imdb-yellow, #f5c518); color: #000; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; transition: background-color 0.2s; }
    .auth-btn:hover { background-color: #e3b616; }
    .cancel-link { display: block; text-align: center; margin-top: 20px; color: #5799ef; text-decoration: none; font-size: 14px; font-weight: bold; }
    .cancel-link:hover { text-decoration: underline; }
</style>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Edit Profile</h1>
        </div>

        <form method="POST" action="{% url 'apps.social:edit_profile' %}" enctype="multipart/form-data">
            {% csrf_token %}
            
            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {{ field.errors }}
            </div>
            {% endfor %}
            
            <button class="auth-btn" type="submit">Save Changes</button>
        </form>

        <a href="{% url 'apps.social:profile' request.user.username %}" class="cancel-link">Cancel</a>
    </div>
</div>
{% endblock %}
