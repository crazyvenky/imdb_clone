{% extends "base.html" %}

{% block title %}Reset Password - CineVerse{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div style="font-size:36px; margin-bottom:12px;">🔑</div>
            <h1>Forgot Password?</h1>
            <p>Enter your email and we'll send you a reset link.</p>
        </div>

        <form method="POST" action="{% url 'account_reset_password' %}" class="styled-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_email">Email Address</label>
                <input
                    type="email"
                    id="id_email"
                    name="email"
                    required
                    placeholder="name@example.com"
                    autocomplete="email"
                >
            </div>
            <button type="submit" class="auth-btn">Send Reset Email</button>
        </form>

        <div class="auth-links" style="margin-top:16px;">
            <a href="{% url 'account_login' %}">← Back to Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
