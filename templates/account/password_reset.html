{% extends "base.html" %}

{% block title %}Reset Password - CineVerse{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Reset Password</h1>
            <p>Forgotten your password? Enter your email address below, and we'll send you an email allowing you to reset it.</p>
        </div>

        <form method="POST" action="{% url 'account_reset_password' %}" class="styled-form">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="name@example.com">
            </div>
            <button type="submit" class="auth-btn">Send Reset Email</button>
        </form>

        <div class="auth-links">
            <a href="{% url 'account_login' %}">Back to Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
