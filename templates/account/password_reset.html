{% extends "base.html" %}

{% block title %}Reset Password - CineVerse{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto; background: var(--imdb-light-gray); padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.5);">
    <h1 style="text-align: center; margin-top: 0; color: var(--text-main);">Reset Password</h1>
    <p style="text-align: center; color: #aaa; margin-bottom: 30px; font-size: 14px;">
        Forgotten your password? Enter your email address below, and we'll send you an email allowing you to reset it.
    </p>

    <form method="POST" action="{% url 'account_reset_password' %}">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 12px; color: #aaa; margin-bottom: 5px;">Email Address</label>
            <input type="email" name="email" required placeholder="name@example.com"
                   style="width: 100%; padding: 12px; border-radius: 4px; border: 1px solid #555; background: #1a1a1a; color: #fff; box-sizing: border-box;">
        </div>

        <button type="submit" style="width: 100%; background-color: var(--imdb-yellow); color: var(--imdb-black); border: none; padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 16px;">
            Send Reset Email
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <a href="{% url 'account_login' %}" style="color: #5799ef; text-decoration: none; font-size: 14px;">Back to Sign In</a>
    </div>
</div>
{% endblock %}
