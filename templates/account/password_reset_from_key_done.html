{% extends "base.html" %}

{% block title %}Password Changed - CineVerse{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="text-align:center;">
        <div style="font-size:48px;color:#4CAF50;margin-bottom:18px;">✓</div>
        <h1 style="margin-top:0;">Password Changed!</h1>
        <p style="color:#aaa;margin-bottom:28px;font-size:14px;line-height:1.6;">
            Your password has been successfully updated. You can now sign in using your new credentials.
        </p>
        <a href="{% url 'account_login' %}" class="auth-btn" style="display:inline-block;text-decoration:none;">
            Sign In
        </a>
    </div>
</div>
{% endblock %}
