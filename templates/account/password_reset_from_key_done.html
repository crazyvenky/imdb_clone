{% extends "base.html" %}

{% block title %}Password Changed - CineVerse{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto; background: var(--imdb-light-gray); padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); text-align: center;">
    <div style="font-size: 48px; color: #4CAF50; margin-bottom: 20px;">✓</div>
    <h1 style="margin-top: 0; color: var(--text-main);">Password Changed!</h1>
    
    <p style="color: #aaa; margin-bottom: 30px; font-size: 14px;">
        Your password has been successfully updated. You can now sign in using your new credentials.
    </p>

    <a href="{% url 'account_login' %}" style="display: inline-block; width: 100%; box-sizing: border-box; background-color: var(--imdb-yellow); color: var(--imdb-black); text-decoration: none; padding: 12px; border-radius: 4px; font-weight: bold; font-size: 16px;">
        Sign In
    </a>
</div>
{% endblock %}
