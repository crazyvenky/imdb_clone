{% extends "base.html" %}

{% block title %}Password Changed - CineVerse{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="text-align:center;">
        <div style="font-size:52px; color:#4CAF50; margin-bottom:18px;">✓</div>
        <h1 style="margin:0 0 12px 0; color:#fff; font-size:22px;">Password Updated!</h1>
        <p style="color:#888; font-size:14px; line-height:1.7; margin:0 0 28px 0;">
            Your password has been successfully changed.
            You can now sign in with your new credentials.
        </p>
        <a href="{% url 'account_login' %}" class="auth-btn" style="display:inline-block; text-decoration:none; width:auto; padding:10px 28px;">
            Sign In
        </a>
    </div>
</div>
{% endblock %}
