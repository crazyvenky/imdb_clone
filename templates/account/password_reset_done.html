{% extends "base.html" %}

{% block title %}Email Sent - CineVerse{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="text-align:center;">
        <div style="font-size:52px; color:var(--imdb-yellow); margin-bottom:18px;">✉️</div>
        <h1 style="margin:0 0 12px 0; color:#fff; font-size:22px;">Check Your Inbox</h1>
        <p style="color:#888; font-size:14px; line-height:1.7; margin:0 0 28px 0;">
            We've sent a password reset email. If it doesn't arrive within a few minutes,
            check your spam folder.
        </p>
        <a href="{% url 'account_login' %}" class="auth-btn" style="display:inline-block; text-decoration:none; width:auto; padding:10px 28px;">
            Return to Sign In
        </a>
    </div>
</div>
{% endblock %}
