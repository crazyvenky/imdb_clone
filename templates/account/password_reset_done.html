{% extends "base.html" %}

{% block title %}Email Sent - CineVerse{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto; background: var(--imdb-light-gray); padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); text-align: center;">
    <div style="font-size: 48px; color: var(--imdb-yellow); margin-bottom: 20px;">✉️</div>
    <h1 style="margin-top: 0; color: var(--text-main);">Check Your Inbox</h1>
    
    <p style="color: #aaa; margin-bottom: 30px; font-size: 14px; line-height: 1.5;">
        We have sent you an email. Please contact us if you do not receive it within a few minutes.
    </p>

    <a href="{% url 'account_login' %}" style="display: inline-block; background-color: #333; color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 4px; font-weight: bold;">
        Return to Sign In
    </a>
</div>
{% endblock %}
