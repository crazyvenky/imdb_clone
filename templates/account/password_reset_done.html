{% extends "base.html" %}

{% block title %}Email Sent - CineVerse{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="text-align:center;">
        <div style="font-size:48px;color:var(--imdb-yellow);margin-bottom:18px;">✉️</div>
        <h1 style="margin-top:0;">Check Your Inbox</h1>
        <p style="color:#aaa;margin-bottom:28px;font-size:14px;line-height:1.6;">
            We have sent you an email. Please contact us if you do not receive it within a few minutes.
        </p>
        <a href="{% url 'account_login' %}" class="auth-btn" style="display:inline-block;text-decoration:none;padding:10px 24px;width:auto;">
            Return to Sign In
        </a>
    </div>
</div>
{% endblock %}
