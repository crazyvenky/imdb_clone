{% extends "base.html" %}
{% load i18n %}

{% block title %}Create Account - CineVerse{% endblock %}

{% block content %}
<style>
    .auth-container { display: flex; justify-content: center; align-items: center; min-height: 70vh; padding: 20px; }
    .auth-card { background: var(--imdb-light-gray, #1a1a1a); padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); border: 1px solid #333; }
    .auth-header { text-align: center; margin-bottom: 30px; }
    .auth-header h1 { margin: 0 0 10px 0; color: #fff; font-size: 28px; font-weight: 900; }
    .auth-header p { color: #aaa; margin: 0; font-size: 14px; }
    .auth-card form p { margin-bottom: 15px; }
    .auth-card label { display: block; color: #ddd; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
    .auth-card input[type="text"], .auth-card input[type="password"], .auth-card input[type="email"] { width: 100%; background: #111; color: #fff; border: 1px solid #333; border-radius: 4px; padding: 12px; font-size: 16px; box-sizing: border-box; }
    .auth-card input:focus { outline: none; border-color: var(--imdb-yellow, #f5c518); }
    .auth-btn { width: 100%; background-color: var(--imdb-yellow, #f5c518); color: #000; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; transition: background-color 0.2s; }
    .auth-btn:hover { background-color: #e3b616; }
    .auth-links { text-align: center; margin-top: 20px; font-size: 14px; }
    .auth-links a { color: #5799ef; text-decoration: none; }
    .auth-links a:hover { text-decoration: underline; }
    .helptext { font-size: 12px; color: #888; display: block; margin-top: 4px; }
    .errorlist { color: #e74c3c; list-style-type: none; padding: 0; font-size: 13px; margin-bottom: 15px; }
</style>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p>Join the CineVerse community</p>
        </div>

        <form class="signup" id="signup_form" method="post" action="{% url 'account_signup' %}">
            {% csrf_token %}
            
            {{ form.as_p }}
            
            {% if redirect_field_value %}
            <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
            {% endif %}
            
            <button class="auth-btn" type="submit">{% trans "Sign Up" %}</button>
        </form>

        <div class="auth-links">
            <p style="color: #aaa; margin: 0;">
                Already have an account? <a href="{% url 'account_login' %}">Sign In</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
