{% extends 'base.html' %}

{% block title %}Edit List - {{ custom_list.name }}{% endblock %}

{% block content %}
<style>
    .list-form-card { max-width: 780px; margin: 0 auto; }
    .list-form-body { background: var(--imdb-light-gray); padding: 30px; border-radius: 8px; margin-top: 16px; }
    .list-input {
        width: 100%; padding: 14px; border-radius: 4px;
        border: 1px solid #555; background: transparent;
        color: #fff; font-size: 16px; outline: none;
        transition: border-color 0.2s;
    }
    .list-input:focus { border-color: var(--imdb-yellow); }
    .list-input-group { margin-bottom: 20px; }
    .list-input-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 6px; font-weight: bold; }
    .privacy-label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; cursor: pointer; }
    .privacy-label input[type="radio"] { accent-color: var(--imdb-yellow); }
    .privacy-sublabel { color: #aaa; font-size: 12px; }
    .save-btn {
        background-color: var(--imdb-yellow); color: #000; border: none;
        padding: 10px 28px; font-weight: bold; font-size: 16px;
        border-radius: 20px; cursor: pointer; transition: background 0.2s;
    }
    .save-btn:hover { background-color: #e3b616; }

    /* Danger zone */
    .danger-zone {
        margin-top: 48px; padding: 20px;
        border: 1px solid #ff4d4d; border-radius: 8px;
        background: rgba(255,77,77,0.05);
    }
    .danger-zone h3 { color: #ff4d4d; margin-top: 0; }
    .delete-btn {
        background: transparent; color: #ff4d4d;
        border: 1px solid #ff4d4d; padding: 8px 16px;
        font-weight: bold; border-radius: 4px; cursor: pointer;
        transition: background 0.2s;
    }
    .delete-btn:hover { background: rgba(255,77,77,0.1); }

    @media (max-width: 600px) {
        .list-form-body { padding: 20px 14px; }
    }
</style>

<div class="list-form-card">
    <h1 style="font-size:28px;margin-bottom:4px;">Edit your list</h1>

    <div class="list-form-body">
        <form method="POST">
            {% csrf_token %}

            <div class="list-input-group">
                <label>List Name *</label>
                <input type="text" name="name" value="{{ custom_list.name }}" required class="list-input">
            </div>

            <div class="list-input-group">
                <label>Description</label>
                <textarea name="description" rows="4" class="list-input" style="resize:vertical;">{{ custom_list.description }}</textarea>
            </div>

            <div class="list-input-group">
                <h4 style="margin:0 0 10px 0;font-size:14px;color:#fff;">Privacy Setting</h4>
                <label class="privacy-label">
                    <input type="radio" name="is_public" value="True" {% if custom_list.is_public %}checked{% endif %}>
                    <span>Public <span class="privacy-sublabel">(Anyone can view your list)</span></span>
                </label>
                <label class="privacy-label">
                    <input type="radio" name="is_public" value="False" {% if not custom_list.is_public %}checked{% endif %}>
                    <span>Private <span class="privacy-sublabel">(Only you can view your list)</span></span>
                </label>
            </div>

            <button type="submit" class="save-btn">Save Changes</button>
        </form>
    </div>

    <div class="danger-zone">
        <h3>Danger Zone</h3>
        <p style="color:#aaa;font-size:14px;margin-bottom:14px;">Once you delete a list, there is no going back. Please be certain.</p>
        <form method="POST" onsubmit="return confirm('Are you sure you want to permanently delete this list? This cannot be undone.');">
            {% csrf_token %}
            <button type="submit" name="delete_list" class="delete-btn">Delete this list</button>
        </form>
    </div>
</div>

{% endblock %}
