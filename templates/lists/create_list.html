{% extends 'base.html' %}

{% block title %}Create a new list - CineVerse{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: 32px; margin-bottom: 5px;">Create a new list</h1>
    <p style="color: #aaa; margin-top: 0; margin-bottom: 30px;">List your movie, TV & celebrity picks.</p>

    <form method="POST" style="background: var(--imdb-light-gray); padding: 30px; border-radius: 8px;">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px;">
            <input type="text" name="name" placeholder="Enter the name of your list" required
                   style="width: 100%; padding: 15px; border-radius: 4px; border: 1px solid #555; background: transparent; color: #fff; font-size: 16px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
            <textarea name="description" placeholder="Describe your list..." rows="4"
                      style="width: 100%; padding: 15px; border-radius: 4px; border: 1px solid #555; background: transparent; color: #fff; font-size: 16px; box-sizing: border-box; resize: vertical;"></textarea>
        </div>

        <div style="margin-bottom: 20px;">
            <h4 style="margin: 0 0 10px 0;">Privacy setting</h4>
            <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px; cursor: pointer;">
                <input type="radio" name="is_public" value="True" style="accent-color: var(--imdb-yellow);">
                <span>Public <span style="color: #aaa; font-size: 12px;">(Anyone can view your list)</span></span>
            </label>
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="radio" name="is_public" value="False" checked style="accent-color: var(--imdb-yellow);">
                <span>Private <span style="color: #aaa; font-size: 12px;">(Only you can view your list)</span></span>
            </label>
        </div>

        <button type="submit" style="background-color: var(--imdb-yellow); color: #000; border: none; padding: 10px 30px; font-weight: bold; font-size: 16px; border-radius: 20px; cursor: pointer;">
            Create
        </button>
    </form>
</div>
{% endblock %}
