{% extends 'base.html' %}

{% block title %}Create a new list - CineVerse{% endblock %}

{% block content %}
<style>
    .list-form-card {
        max-width: 780px;
        margin: 0 auto;
    }
    .list-form-body {
        background: var(--imdb-light-gray);
        padding: 30px;
        border-radius: 8px;
        margin-top: 20px;
    }
    .list-input {
        width: 100%;
        padding: 14px;
        border-radius: 4px;
        border: 1px solid #555;
        background: transparent;
        color: #fff;
        font-size: 16px;
        outline: none;
        transition: border-color 0.2s;
    }
    .list-input:focus { border-color: var(--imdb-yellow); }
    .list-input-group { margin-bottom: 20px; }
    .list-input-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 6px; font-weight: bold; }
    .privacy-label {
        display: flex; align-items: center;
        gap: 8px; margin-bottom: 10px; cursor: pointer;
    }
    .privacy-label input[type="radio"] { accent-color: var(--imdb-yellow); }
    .privacy-sublabel { color: #aaa; font-size: 12px; }
    .create-btn {
        background-color: var(--imdb-yellow);
        color: #000;
        border: none;
        padding: 10px 28px;
        font-weight: bold;
        font-size: 16px;
        border-radius: 20px;
        cursor: pointer;
        transition: background 0.2s;
    }
    .create-btn:hover { background-color: #e3b616; }

    @media (max-width: 600px) {
        .list-form-body { padding: 20px 16px; }
    }
</style>

<div class="list-form-card">
    <h1 style="font-size:28px;margin-bottom:4px;">Create a new list</h1>
    <p style="color:#aaa;margin:0 0 0 2px;font-size:14px;">List your movie, TV &amp; celebrity picks.</p>

    <div class="list-form-body">
        <form method="POST">
            {% csrf_token %}

            <div class="list-input-group">
                <label>List Name *</label>
                <input type="text" name="name" class="list-input" placeholder="Enter the name of your list" required>
            </div>

            <div class="list-input-group">
                <label>Description</label>
                <textarea name="description" class="list-input" rows="4" style="resize:vertical;" placeholder="Describe your list..."></textarea>
            </div>

            <div class="list-input-group">
                <h4 style="margin:0 0 10px 0;font-size:14px;color:#fff;">Privacy Setting</h4>
                <label class="privacy-label">
                    <input type="radio" name="is_public" value="True">
                    <span>Public <span class="privacy-sublabel">(Anyone can view your list)</span></span>
                </label>
                <label class="privacy-label">
                    <input type="radio" name="is_public" value="False" checked>
                    <span>Private <span class="privacy-sublabel">(Only you can view your list)</span></span>
                </label>
            </div>

            <button type="submit" class="create-btn">Create</button>
        </form>
    </div>
</div>

{% endblock %}
